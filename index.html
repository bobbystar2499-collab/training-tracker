<!DOCTYPE html>
<html lang="en">
    <style>
        body {
            font-family: sans-serif;
            font-size: 22px;
            padding: 20px;
            max-width: 480px;
            margin: 0 auto;
            background: #1A1512;
            color: #F2E8DD;
        }
        h1 {
            font-size: 44px;
            text-align: center;
            color: #f4a15e;
        }
        #stats {
            text-align: center;
            color: #c9a98f;
            margin-bottom: 12px;
        }
        h2{
            font-size: 26px;
            color: #f4a15e;
            margin-top: 24px;
        }
        #iceStats {
            text-align: center;
            color: #c9a98f;
            margin-bottom: 12px;
        }
        button, select, input {
            font-size: 18 px;
            padding: 12px;
            width: 100%;
            margin-top: 8px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #3a2e26;
            background: #2a211c;
            color: #f2e8dd;
        }
        #openFormBtn, #saveBtn, #openIceBtn, #iceSaveBtn {
            background: #f4a15e;
            color: #1a1512;
            font-weight: bold;
            border: none;
        }
        .entry-card {
            background-color: #241c18;
            border: 1px solid #3a2e26;
            padding: 12px;
            margin-top: 10px;
        }
    </style>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <title> Ironman Ledger</title>
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#14201C">
    </head>
    <body>
        <h1>Iron Ledger</h1>
        <div id="stats"></div>
        <button id="openFormBtn">Log Workout</button>
        <div id="formBox" style="display:none;">
            <select id="disciplineInput">
                <option value="bike">Bike</option>
                <option value="run">Run</option>
                <option value="swim">Swim</option>
            </select>
            <input type="number" id="distanceInput" placeholder="Distance (mi)">
            <button id="saveBtn">Save</button>
        </div>
        <div id="workoutList"></div>  
        <h2>Ice Baths</h2>
        <div id="iceStats"></div>
        <div id="iceStreaks"></div>
        <button id="openIceBtn">Log Ice Bath</button>
        <div id="iceFormBox" style="display:none;">
        <input type="number" id="iceDurationInput" placeholder="Duration (min)">
        <input type="number" id="iceTempInput" placeholder="Water temp (F)">
        <button id="iceSaveBtn">Save</button>
    </div>
    <div id="iceList"></div>
        <script>
            let workouts= JSON.parse(localStorage.getItem("workouts")) || []

            function render() {
                document.getElementById("stats").innerText= 
                "Total Workouts Logged: " + workouts.length;

                const list = document.getElementById("workoutList");
                list.innerHTML ="";
                workouts.forEach(function(w){
                    const item = document.createElement("p");
                    item.innerText =w.discipline + ":" + w.distance + "mi";
                    list.appendChild(item);
                });
            }

           document.getElementById("openFormBtn").addEventListener("click", function(){
            document.getElementById("formBox").style.display = "block";
           });

           document.getElementById("saveBtn").addEventListener("click", function(){
            const discipline = document.getElementById("disciplineInput").value;
            const distance = document.getElementById("distanceInput").value;
            workouts.push({ discipline: discipline, distance: distance});
            localStorage.setItem("workouts", JSON.stringify(workouts))
            document.getElementById("formBox").style.display = "none";
            document.getElementById("distanceInput").value = "";
           });

            let iceBaths = JSON.parse(localStorage.getItem("iceBaths")) || []

            function renderIce() {
                document.getElementById("iceStats").innerText=
                "Total Ice Baths Logged: " + iceBaths.length;

                let streak = 0;
                let checkDate = new Date();
                while(true){
                    const dateStr = checkDate.toDateString();
                    const hasEntry = iceBaths.some(function(ib) {
                        return ib.date === dateStr;
                    });
                    if(hasEntry) {
                        streak++;
                        checkDate.setDate(checkDate.getDate() - 1);
                    } else {
                        break;
                    }
                }
                document.getElementById("iceStreaks").innerText = "Current streak: " + streak + " days ";


                const list  = document.getElementById("iceList");
                list.innerHTML ="";
                iceBaths.forEach(function(ib) {
                    const item = document.createElement("p")
                    item.innerText = ib.date + "--" + ib.duration + " min, " + ib.temp + "F";
                    list.appendChild(item);
                });
            }

            document.getElementById("openIceBtn").addEventListener("click", function(){
                document.getElementById("iceFormBox").style.display = "block";
            });

            document.getElementById("iceSaveBtn").addEventListener("click", function(){
                const duration = document.getElementById("iceDurationInput").value;
                const temp = document.getElementById("iceTempInput").value;
                const today = new Date().toDateString();
                iceBaths.push({ duration:duration, temp: temp, date: today });
                localStorage.setItem("iceBaths", JSON.stringify(iceBaths))
                document.getElementById("iceFormBox").style.display = "none";
                document.getElementById("iceDurationInput").value = "";
                document.getElementById("iceTempInput").value = "";
                renderIce();
            });

            render();
            renderIce();
        </script>      
    </body>
</html>
